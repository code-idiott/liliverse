<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lilia's Universe 🦢</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&family=Pinyon+Script&display=swap">
    <style>
        /* --- CORE DESIGN SYSTEM --- */
        :root {
            --bg-base: #06060c;
            --text-main: #f3f3f6;
            --text-muted: #a0a0ba;
            --accent-gold: #e2b755;
            --accent-lavender: #b3a7d6;
            --glass-card: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.07);
            --font-cinzel: 'Cinzel', serif;
            --font-sans: 'Inter', sans-serif;
            --font-cursive: 'Pinyon Script', cursive;
            --transition-smooth: cubic-bezier(0.25, 1, 0.5, 1);
        }

        [data-universe="romantic"] {
            --bg-base: #1c1424;
            --text-main: #fff0f5;
            --text-muted: #dfcadb;
            --accent-gold: #ff69b4;
            --accent-lavender: #f0c2e0;
            --glass-card: rgba(255, 105, 180, 0.05);
            --glass-border: rgba(255, 105, 180, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body, html {
            width: 100%;
            overflow-x: hidden;
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: var(--font-sans);
            transition: background-color 3s var(--transition-smooth);
        }

        /* Hide scrollbar during introductory sequences */
        body.locked {
            overflow: hidden;
            height: 100vh;
        }

        /* --- GLOBAL CANVAS ARCHITECTURE --- */
        #universeCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        /* --- STAGE 1: CINEMATIC ENTRANCE SEQUENCE --- */
        #entranceStage {
            position: fixed;
            inset: 0;
            background-color: #020205;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 1.5s var(--transition-smooth), pointer-events 1.5s;
        }

        .singularity-star {
            width: 8px;
            height: 8px;
            background: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 25px 8px #ffffff, 0 0 50px 15px var(--accent-gold);
            cursor: pointer;
            transition: transform 0.3s ease;
            position: relative;
        }

        .singularity-star:hover {
            transform: scale(1.5);
        }

        .singularity-star::before {
            content: 'Click To Ignite';
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            color: var(--text-muted);
            font-family: var(--font-cinzel);
            font-size: 0.75rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            opacity: 0.6;
        }

        .manifest-title-box {
            position: absolute;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.95);
            transition: all 2s var(--transition-smooth);
        }

        .manifest-title-box.active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }

        .manifest-title {
            font-family: var(--font-cinzel);
            font-size: clamp(3rem, 8vw, 6.5rem);
            font-weight: 400;
            letter-spacing: 0.15em;
            color: #ffffff;
            text-shadow: 0 0 40px rgba(255,255,255,0.2);
            margin-bottom: 15px;
        }

        .manifest-sub {
            font-family: var(--font-cinzel);
            font-size: clamp(0.9rem, 2vw, 1.4rem);
            color: var(--accent-gold);
            letter-spacing: 0.4em;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .universe-btn {
            background: transparent;
            border: 1px solid var(--accent-gold);
            color: #ffffff;
            padding: 14px 36px;
            font-family: var(--font-cinzel);
            font-size: 0.85rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            border-radius: 2px;
            transition: all 0.4s;
        }

        .universe-btn:hover {
            background: #ffffff;
            color: #000000;
            box-shadow: 0 0 30px rgba(255,255,255,0.4);
        }

        /* --- MAIN INTERACTIVE EXPERIENCES DISPLAY LAYER --- */
        #universeDisplay {
            position: relative;
            z-index: 2;
            width: 100%;
            opacity: 0;
            transition: opacity 2s ease;
        }

        section {
            position: relative;
            min-height: 100vh;
            padding: 120px 6vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .section-header {
            max-width: 700px;
            margin-bottom: 80px;
        }

        .section-tag {
            font-family: var(--font-cinzel);
            color: var(--accent-gold);
            font-size: 0.85rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-bottom: 12px;
            display: block;
        }

        .section-headline {
            font-family: var(--font-cinzel);
            font-size: clamp(2.2rem, 4vw, 3.8rem);
            font-weight: 400;
            line-height: 1.2;
        }

        /* --- SECTION A: CONSTELLATION SPACE --- */
        .constellation-wrapper {
            position: relative;
            width: 100%;
            height: 75vh;
            border-radius: 24px;
            background: rgba(4, 4, 8, 0.3);
            border: 1px solid var(--glass-border);
            overflow: hidden;
        }

        .star-node {
            position: absolute;
            width: 16px;
            height: 16px;
            background: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 15px 3px #ffffff;
            cursor: pointer;
            transform: translate(-50%, -50%);
            transition: transform 0.4s var(--transition-smooth);
            z-index: 5;
        }

        .star-node:hover {
            transform: translate(-50%, -50%) scale(1.6);
        }

        .node-thumbnail {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 12px;
            object-fit: cover;
            top: -100px;
            left: 50%;
            transform: translateX(-50%) scale(0.6);
            opacity: 0;
            pointer-events: none;
            border: 2px solid #ffffff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: all 0.4s var(--transition-smooth);
        }

        .star-node:hover .node-thumbnail {
            opacity: 1;
            transform: translateX(-50%) scale(1);
            top: -110px;
        }

        /* --- PREMIUM LIGHTBOX ENGINE --- */
        .universe-lightbox {
            position: fixed;
            inset: 0;
            background: rgba(3, 3, 6, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .universe-lightbox.active {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox-container {
            position: relative;
            max-width: 85vw;
            max-height: 80vh;
            perspective: 1000px;
        }

        .lightbox-img {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 8px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            transform: rotateY(0deg);
            transition: transform 0.1s linear;
        }

        .lightbox-close {
            position: absolute;
            top: -50px;
            right: 0;
            background: transparent;
            border: none;
            color: #ffffff;
            font-family: var(--font-cinzel);
            font-size: 1rem;
            cursor: pointer;
            letter-spacing: 0.1em;
        }

        /* --- SECTION B: TRAVEL MEMORY MAP DISPLAY --- */
        .map-stage {
            position: relative;
            width: 100%;
            height: 70vh;
            background: #090911;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            overflow: hidden;
        }

        .vector-map-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .postcard-3d {
            position: absolute;
            width: 220px;
            height: 160px;
            background: #ffffff;
            padding: 10px;
            border-radius: 4px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.5s var(--transition-smooth);
        }

        .postcard-3d img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: sepia(0.1);
        }

        .postcard-3d .back-sheet {
            position: absolute;
            inset: 0;
            background: #fbf8f0;
            color: #1a1a24;
            padding: 15px;
            transform: rotateY(180deg);
            backface-visibility: hidden;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            font-family: var(--font-serif);
            border: 1px solid #e5dec9;
        }

        .postcard-3d.flipped {
            transform: rotateY(180deg) scale(1.1);
            z-index: 100;
        }

        /* --- SECTION C: CREATIVE DNA PLANETS AREA --- */
        .dna-orbit-container {
            position: relative;
            width: 100%;
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .planet-sphere {
            position: absolute;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.15), rgba(0,0,0,0.8));
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: grab;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.05);
            transition: box-shadow 0.4s;
        }

        .planet-sphere:active {
            cursor: grabbing;
        }

        .planet-sphere h4 {
            font-family: var(--font-cinzel);
            font-size: 0.95rem;
            letter-spacing: 0.1em;
            margin-top: 8px;
            pointer-events: none;
        }

        .planet-icon {
            font-size: 2.2rem;
            pointer-events: none;
        }

        .planet-fx {
            position: absolute;
            inset: -15px;
            border-radius: 50%;
            border: 1px dashed rgba(226, 183, 85, 0.2);
            animation: spin 20s linear infinite;
            pointer-events: none;
        }

        /* --- SECTION D: IMMERSIVE PHOTO RAIN VIEWPORT --- */
        .rain-viewport {
            position: relative;
            width: 100%;
            height: 90vh;
            background: rgba(3, 3, 6, 0.4);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            overflow: hidden;
        }

        .falling-memory {
            position: absolute;
            width: 140px;
            height: 180px;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            cursor: pointer;
            pointer-events: auto;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* --- THE SECRET TARGET SPRITE --- */
        #cosmicSwan {
            position: fixed;
            width: 40px;
            height: 40px;
            font-size: 1.8rem;
            z-index: 999;
            pointer-events: auto;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
            transform: translate(-50%, -50%);
        }

        /* --- STAGE 2: THE LETTER DIMENSION --- */
        #letterDimension {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #2d1f38 0%, #110917 100%);
            z-index: 20000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transform: scale(1.1);
            transition: opacity 2s var(--transition-smooth), transform 2s var(--transition-smooth);
            padding: 30px;
        }

        #letterDimension.active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }

        .dimension-clouds {
            position: absolute;
            inset: 0;
            mix-blend-mode: screen;
            opacity: 0.15;
            background: radial-gradient(circle at 20% 30%, #ff69b4 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, #b3a7d6 0%, transparent 50%);
            pointer-events: none;
        }

        .scroll-envelope {
            width: 100%;
            max-width: 700px;
            background: #fbf7f0;
            border: 1px solid #ebdcb9;
            border-radius: 12px;
            box-shadow: 0 40px 90px rgba(0,0,0,0.6);
            padding: 50px 60px;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            color: #261f2c;
            transform: translateY(30px);
            transition: transform 1.5s var(--transition-smooth) 0.5s;
        }

        #letterDimension.active .scroll-envelope {
            transform: translateY(0);
        }

        .letter-cursive-payload {
            font-family: var(--font-cursive);
            font-size: clamp(1.8rem, 3.2vw, 2.6rem);
            line-height: 1.4;
            color: #201727;
            white-space: pre-wrap;
            border-right: 2px solid transparent;
        }

        .matrix-options-box {
            margin-top: 50px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            opacity: 0;
            transition: opacity 1s ease 1s;
        }

        .matrix-options-box.reveal {
            opacity: 1;
        }

        .option-node-btn {
            background: #23192b;
            color: #fff0f5;
            border: none;
            padding: 14px 28px;
            font-family: var(--font-cinzel);
            font-size: 0.8rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
        }

        .option-node-btn:hover {
            background: var(--accent-gold);
            color: #000000;
            transform: translateY(-3px);
        }

        /* --- GLOBAL FX ANIMATIONS --- */
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- RESPONSIVE LAYOUT CLEANUP --- */
        @media (max-width: 768px) {
            section { padding: 80px 20px; }
            .constellation-wrapper { height: 50vh; }
            .map-stage { height: 55vh; }
            .postcard-3d { width: 150px; height: 110px; }
            .scroll-envelope { padding: 30px; }
        }
    </style>
</head>
<body class="locked">

    <!-- UNIVERSAL BACKGROUND VECTOR SIMULATION ENGINE -->
    <canvas id="universeCanvas"></canvas>

    <!-- FLOATING HIDDEN SWAN TARGET SYSTEM -->
    <div id="cosmicSwan">🦢</div>

    <!-- STAGE 1: PORTAL ENTRANCE SEQUENCE -->
    <div id="entranceStage">
        <div class="singularity-star" id="singularityTrigger"></div>
        <div class="manifest-title-box" id="manifestTitleBox">
            <h1 class="manifest-title">Lilia 🦢</h1>
            <p class="manifest-sub">A Universe Captured Through Her Eyes</p>
            <button class="universe-btn" id="enterUniverseBtn">Explore Universe</button>
        </div>
    </div>

    <!-- MAIN DISPLAY INFRASTRUCTURE -->
    <div id="universeDisplay">

        <!-- CONSTELLATION GALLERY COMPONENT -->
        <section id="constellationSection">
            <div class="section-header">
                <span class="section-tag">Visual Array 01</span>
                <h2 class="section-headline">Photo Constellations</h2>
            </div>
            <div class="constellation-wrapper" id="constellationContainer"></div>
        </section>

        <!-- TRAVEL MEMORY MAPPING SYSTEM -->
        <section id="travelMapSection">
            <div class="section-header">
                <span class="section-tag">Spatial Odyssey 02</span>
                <h2 class="section-headline">Travel Memory Journals</h2>
            </div>
            <div class="map-stage" id="mapStageContainer">
                <svg class="vector-map-canvas" id="mapSvgEngine" viewBox="0 0 1000 600"></svg>
            </div>
        </section>

        <!-- PLANETARY INTEREST VECTOR DRAG FIELDS -->
        <section id="dnaSection">
            <div class="section-header">
                <span class="section-tag">Creative Metrics 03</span>
                <h2 class="section-headline">Creative DNA Structure</h2>
            </div>
            <div class="dna-orbit-container" id="orbitContainer">
                <!-- Planet 1 -->
                <div class="planet-sphere" style="left: 15%; top: 20%;" data-interest="photography">
                    <div class="planet-fx"></div>
                    <span class="planet-icon">📷</span>
                    <h4>Photography</h4>
                </div>
                <!-- Planet 2 -->
                <div class="planet-sphere" style="left: 45%; top: 15%;" data-interest="travel">
                    <div class="planet-fx"></div>
                    <span class="planet-icon">🌍</span>
                    <h4>Travel</h4>
                </div>
                <!-- Planet 3 -->
                <div class="planet-sphere" style="left: 25%; top: 55%;" data-interest="cs">
                    <div class="planet-fx"></div>
                    <span class="planet-icon">💻</span>
                    <h4>Technology</h4>
                </div>
                <!-- Planet 4 -->
                <div class="planet-sphere" style="left: 65%; top: 50%;" data-interest="dance">
                    <div class="planet-fx"></div>
                    <span class="planet-icon">💃</span>
                    <h4>Kinetic Rhythm</h4>
                </div>
            </div>
        </section>

        <!-- PHOTOGRAPHIC RAIN PLATFORM INTERSECTION MATRIX -->
        <section id="rainSection">
            <div class="section-header">
                <span class="section-tag">Memory Drift 04</span>
                <h2 class="section-headline">The Photograph Rain</h2>
            </div>
            <div class="rain-viewport" id="rainContainer"></div>
        </section>

    </div>

    <!-- MOUNTED DETACHED VIEWPORT: LIGHTBOX SYSTEM -->
    <div class="universe-lightbox" id="universalLightbox">
        <button class="lightbox-close" id="lightboxCloseBtn">Close</button>
        <div class="lightbox-container">
            <img src="" alt="" class="lightbox-img" id="lightboxTargetImg">
        </div>
    </div>

    <!-- STAGE 2: THE SECURE LETTER DIMENSION VIEWPORT -->
    <div id="letterDimension">
        <div class="dimension-clouds"></div>
        <div class="scroll-envelope">
            <div class="letter-cursive-payload" id="typewriterTarget"></div>
            <div class="matrix-options-box" id="matrixOptionBox">
                <button class="option-node-btn" onclick="exitDimension('explore')">✨ Continue Exploring</button>
                <button class="option-node-btn" onclick="exitDimension('collection')">📷 Memory Collection</button>
                <button class="option-node-btn" onclick="exitDimension('reality')">🦢 Return To Reality</button>
            </div>
        </div>
    </div>

    <!-- AUTOMATED DATA EXTRACTION STORAGE REGISTRY -->
    <script>
        const imageDatabase = [
            "https://i.ibb.co/TDsRgbhV/photo-27-2026-06-10-15-40-32.jpg",
            "https://i.ibb.co/qFjhRJkr/photo-25-2026-06-10-15-40-32.jpg",
            "https://i.ibb.co/KzVjLVGX/photo-23-2026-06-10-15-40-32.jpg",
            "https://i.ibb.co/YTwM4Vk6/photo-22-2026-06-10-15-40-32.jpg",
            "https://i.ibb.co/tMWgHmqQ/photo-20-2026-06-10-15-40-32.jpg",
            "https://i.ibb.co/TM2MtkbP/photo-21-2026-06-10-15-40-32.jpg",
            "https://i.ibb.co/ZpGNtgQ9/photo-19-2026-06-10-15-40-32.jpg",
            "https://i.ibb.co/Zzhcf3tt/photo-17-2026-06-10-15-40-32.jpg",
            "https://i.ibb.co/kVGP6P7F/photo-15-2026-06-10-15-40-32.jpg",
            "https://i.ibb.co/LDpxgTw0/photo-12-2026-06-10-15-40-32.jpg",
            "https://i.ibb.co/cc4nJwPN/photo-10-2026-06-10-15-40-32.jpg",
            "https://i.ibb.co/rKYd1MFR/photo-11-2026-06-10-15-40-32.jpg",
            "https://i.ibb.co/jvCt4bG9/photo-9-2026-06-10-15-40-32.jpg",
            "https://i.ibb.co/8n1mftnR/photo-8-2026-06-10-15-40-32.jpg",
            "https://i.ibb.co/MyhVfmwF/photo-3-2026-06-10-15-40-32.jpg",
            "https://i.ibb.co/6cX9jRN1/photo-2-2026-06-10-15-40-32.jpg"
        ];

        const runtimeState = {
            activeStage: 'entrance', 
            cosmicTheme: 'creative', // creative | romantic
            interactionCounter: 0,
            swanTrackingActive: false,
            mouseVector: { x: window.innerWidth/2, y: window.innerHeight/2 },
            swanVector: { x: -100, y: -100 }
        };

        /* --- GLOBAL CANVAS PARTICLES SIMULATION CORE --- */
        const canvas = document.getElementById('universeCanvas');
        const ctx = canvas.getContext('2d');
        let backgroundParticles = [];

        function resizeCanvasEngine() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvasEngine);
        resizeCanvasEngine();

        class CosmicParticle {
            constructor() { this.resetState(); }
            resetState() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.radius = Math.random() * 2.5 + 0.5;
                this.dx = Math.random() * 0.3 - 0.15;
                this.dy = Math.random() * 0.3 - 0.15;
                this.opacity = Math.random() * 0.7 + 0.2;
                this.trait = Math.random() > 0.5 ? 'star' : 'petal';
            }
            update() {
                this.x += this.dx;
                this.y += this.dy;
                if(this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) { this.resetState(); }
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                if (runtimeState.cosmicTheme === 'romantic') {
                    ctx.fillStyle = Math.random() > 0.5 ? '#ff69b4' : '#f0c2e0';
                } else {
                    ctx.fillStyle = '#ffffff';
                }
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function buildParticleCloud(density) {
            backgroundParticles = [];
            for (let i = 0; i < density; i++) { backgroundParticles.push(new CosmicParticle()); }
        }
        buildParticleCloud(100);

        function engineLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            backgroundParticles.forEach(p => { p.update(); p.draw(); });
            processSwanInterpolation();
            requestAnimationFrame(engineLoop);
        }
        requestAnimationFrame(engineLoop);

        /* --- STAGE 1: PORTAL INTERACTION TRIGGERS --- */
        const singularityTrigger = document.getElementById('singularityTrigger');
        const manifestTitleBox = document.getElementById('manifestTitleBox');
        const enterUniverseBtn = document.getElementById('enterUniverseBtn');
        const entranceStage = document.getElementById('entranceStage');
        const universeDisplay = document.getElementById('universeDisplay');

        singularityTrigger.addEventListener('click', () => {
            singularityTrigger.style.transform = 'scale(60)';
            singularityTrigger.style.opacity = '0';
            setTimeout(() => {
                singularityTrigger.style.display = 'none';
                manifestTitleBox.classList.add('active');
            }, 800);
        });

        enterUniverseBtn.addEventListener('click', () => {
            entranceStage.style.opacity = '0';
            setTimeout(() => {
                entranceStage.style.display = 'none';
                document.body.classList.remove('locked');
                universeDisplay.style.opacity = '1';
                runtimeState.activeStage = 'main';
                executeConstellationMapping();
                executeVectorMapTimeline();
                executeRainPhysicsMatrix();
            }, 1500);
        });

        /* --- EXPERIENCE A: DYNAMIC STRUCTURED CONSTELLATIONS --- */
        function executeConstellationMapping() {
            const container = document.getElementById('constellationContainer');
            const nodeCount = 8; 
            const points = [];

            for (let i = 0; i < nodeCount; i++) {
                const node = document.createElement('div');
                node.className = 'star-node';
                const xPct = 10 + (i * 12) + Math.random() * 5;
                const yPct = 20 + (Math.sin(i) * 30) + 20;
                node.style.left = `${xPct}%`;
                node.style.top = `${yPct}%`;

                const thumbnail = document.createElement('img');
                thumbnail.className = 'node-thumbnail';
                thumbnail.src = imageDatabase[i % imageDatabase.length];
                node.appendChild(thumbnail);

                node.addEventListener('click', () => triggerUniversalLightbox(imageDatabase[i % imageDatabase.length]));
                container.appendChild(node);
                points.push({xPx: (xPct/100)*container.clientWidth, yPx: (yPct/100)*container.clientHeight});
            }
        }

        /* --- UNIVERSAL INTERACTIVE LIGHTBOX OPERATIONS --- */
        const universalLightbox = document.getElementById('universalLightbox');
        const lightboxTargetImg = document.getElementById('lightboxTargetImg');
        document.getElementById('lightboxCloseBtn').addEventListener('click', () => universalLightbox.classList.remove('active'));

        function triggerUniversalLightbox(sourceUrl) {
            lightboxTargetImg.src = sourceUrl;
            universalLightbox.classList.add('active');
            trackInteractionMilestones();
        }

        /* --- EXPERIENCE B: SCENIC TRAVEL TRANSITS --- */
        function executeVectorMapTimeline() {
            const svg = document.getElementById('mapSvgEngine');
            const container = document.getElementById('mapStageContainer');
            
            // Map paths
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", "M 150 450 Q 350 150 550 350 T 900 200");
            path.setAttribute("stroke", "rgba(226,183,85,0.4)");
            path.setAttribute("stroke-width", "2");
            path.setAttribute("fill", "none");
            path.setAttribute("stroke-dasharray", "8,8");
            svg.appendChild(path);

            // Places array
            const coordinates = [
                {x: 150, y: 450, img: imageDatabase[2], text: "Sidi Bou Said - Bright blue geometry against pristine white architectural structures."},
                {x: 550, y: 350, img: imageDatabase[7], text: "Djerba - Ancient stacked clay jars absorbing the warm Mediterranean sun."},
                {x: 900, y: 200, img: imageDatabase[9], text: "Matmata - Majestic subterranean historical formations."}
            ];

            coordinates.forEach((coord) => {
                const card = document.createElement('div');
                card.className = 'postcard-3d';
                card.style.left = `${coord.x - 110}px`;
                card.style.top = `${coord.y - 80}px`;
                
                card.innerHTML = `
                    <img src="${coord.img}">
                    <div class="back-sheet">
                        <p style="font-size:0.85rem; line-height:1.4;">${coord.text}</p>
                        <span style="font-size:0.65rem; color:#888; text-transform:uppercase;">Tunisian Journal</span>
                    </div>
                `;

                card.addEventListener('click', () => {
                    card.classList.toggle('flipped');
                    trackInteractionMilestones();
                });
                container.appendChild(card);
            });
        }

        /* --- EXPERIENCE C: INTERACTIVE ORBITAL ANCHORS (DRAG) --- */
        const spheres = document.querySelectorAll('.planet-sphere');
        spheres.forEach(sphere => {
            let activeDrag = false;
            let currentX, currentY, initialX, initialY;
            let xOffset = 0, yOffset = 0;

            sphere.addEventListener('pointerdown', (e) => {
                initialX = e.clientX - xOffset;
                initialY = e.clientY - yOffset;
                if (e.target === sphere || sphere.contains(e.target)) { activeDrag = true; }
            });

            document.addEventListener('pointermove', (e) => {
                if (activeDrag) {
                    e.preventDefault();
                    currentX = e.clientX - initialX;
                    currentY = e.clientY - initialY;
                    xOffset = currentX;
                    yOffset = currentY;
                    sphere.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
                }
            });

            document.addEventListener('pointerup', () => {
                if(activeDrag) {
                    activeDrag = false;
                    trackInteractionMilestones();
                }
            });
        });

        /* --- EXPERIENCE D: PHYSICAL MEMORY FLOATING ENGINE --- */
        function executeRainPhysicsMatrix() {
            const container = document.getElementById('rainContainer');
            const items = [];
            const elementCount = 9;

            for(let i = 0; i < elementCount; i++) {
                const img = document.createElement('img');
                img.className = 'falling-memory';
                img.src = imageDatabase[(i + 4) % imageDatabase.length];
                
                const dataBlock = {
                    element: img,
                    x: Math.random() * (container.clientWidth - 160) + 20,
                    y: Math.random() * (-300) - 100,
                    vy: Math.random() * 1.2 + 0.6,
                    vx: Math.random() * 0.6 - 0.3,
                    rotation: Math.random() * 20 - 10
                };
                
                container.appendChild(img);
                items.push(dataBlock);
            }

            function frameUpdate() {
                if(runtimeState.activeStage !== 'main') return;
                items.forEach(item => {
                    item.y += item.vy;
                    item.x += item.vx;
                    
                    if(item.y > container.clientHeight) {
                        item.y = -200;
                        item.x = Math.random() * (container.clientWidth - 160) + 20;
                    }
                    item.element.style.transform = `translate3d(${item.x}px, ${item.y}px, 0) rotate(${item.rotation}deg)`;
                });
                requestAnimationFrame(frameUpdate);
            }
            requestAnimationFrame(frameUpdate);
        }

        /* --- GAUNTLET ENGINE: HIDDEN SWAN VECTOR FOLLOW TARGET --- */
        const cosmicSwan = document.getElementById('cosmicSwan');
        
        window.addEventListener('mousemove', (e) => {
            runtimeState.mouseVector.x = e.clientX;
            runtimeState.mouseVector.y = e.clientY;
        });

        function processSwanInterpolation() {
            if(!runtimeState.swanTrackingActive) {
                // Gentle floating pattern initialization loop
                const elapsed = Date.now() * 0.001;
                runtimeState.swanVector.x = (window.innerWidth * 0.85) + Math.sin(elapsed) * 15;
                runtimeState.swanVector.y = (window.innerHeight * 0.75) + Math.cos(elapsed) * 15;
            } else {
                // Linear organic pointer tracking interpolation logic
                const dx = runtimeState.mouseVector.x - runtimeState.swanVector.x;
                const dy = runtimeState.mouseVector.y - runtimeState.swanVector.y;
                runtimeState.swanVector.x += dx * 0.05;
                runtimeState.swanVector.y += dy * 0.05;
            }
            cosmicSwan.style.left = `${runtimeState.swanVector.x}px`;
            cosmicSwan.style.top = `${runtimeState.swanVector.y}px`;
        }

        function trackInteractionMilestones() {
            runtimeState.interactionCounter++;
            if(runtimeState.interactionCounter >= 4 && !runtimeState.swanTrackingActive) {
                runtimeState.swanTrackingActive = true;
                cosmicSwan.style.boxShadow = "0 0 30px #ff69b4";
            }
        }

        /* --- THE SURPRISE TRANSFORMATION TRANSIT ENGINE --- */
        cosmicSwan.addEventListener('click', () => {
            triggerMagicalTransformation();
        });

        function triggerMagicalTransformation() {
            runtimeState.cosmicTheme = 'romantic';
            document.body.setAttribute('data-universe', 'romantic');
            buildParticleCloud(180);
            
            // Core structural sequence transition shift mechanics
            setTimeout(() => {
                document.getElementById('letterDimension').classList.add('active');
                document.body.classList.add('locked');
                executeTypewriterPipeline();
            }, 2000);
        }

        /* --- EXPERIENCE E: IMMERSIVE LETTER DIMENSION SYSTEM --- */
        const letterString = `Dear Lilia,

Some people take photographs. You create memories.
Some people visit places. You collect stories.
Some people see the world. You help others feel it.

Your curiosity, creativity, and passion make every moment around you a little more beautiful. Whether you're exploring new horizons across Tunisia, dancing through life, diving into technology, or capturing perfect frames through your lens, you leave a little magic everywhere you go.

This small universe is simply a cinematic reminder that your work, your energy, and your unique perspective deserve to be celebrated.

Keep exploring.
Keep creating.
Keep shining.

Swan 🦢`;

        function executeTypewriterPipeline() {
            const target = document.getElementById('typewriterTarget');
            let idx = 0;
            
            function typeChar() {
                if (idx < letterString.length) {
                    target.textContent += letterString.charAt(idx);
                    idx++;
                    setTimeout(typeChar, 40);
                } else {
                    document.getElementById('matrixOptionBox').classList.add('reveal');
                }
            }
            typeChar();
        }

        function exitDimension(actionNodeKey) {
            document.getElementById('letterDimension').classList.remove('active');
            document.body.classList.remove('locked');
            runtimeState.activeStage = 'main';
            
            if(actionNodeKey === 'reality') {
                runtimeState.cosmicTheme = 'creative';
                document.body.removeAttribute('data-universe');
                buildParticleCloud(90);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }
    </script>
</body>
</html>
